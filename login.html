<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Member Access | Glamour Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
        }

        .gold-text {
            background: linear-gradient(135deg, #f5e050 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 40px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
        }

        .input-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 18px 18px 18px 55px;
            width: 100%;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        .btn-login {
            background: linear-gradient(135deg, #f5e050 0%, #d4af37 100%);
            color: #000;
            font-weight: 800;
            border-radius: 18px;
            padding: 18px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body class="p-6">

    <div class="login-card">
        <div class="text-center mb-10">
            <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.5em] mb-2">Elite Secure Access</h2>
            <h1 class="text-3xl font-black gold-text uppercase italic tracking-tighter">GLAMOUR</h1>
        </div>

        <form id="loginForm">
            <div class="relative mb-4">
                <i class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-yellow-600/60"></i>
                <input type="email" id="loginEmail" placeholder="Email Address" class="input-box" required>
            </div>

            <div class="relative mb-6">
                <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-yellow-600/60"></i>
                <input type="password" id="loginPassword" placeholder="Password" class="input-box" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-login">Unlock Dashboard</button>
            <p id="error-msg" class="text-center text-[10px] font-bold uppercase mt-4"></p>
        </form>

        <div class="text-center mt-10">
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">
                Don't have an account? 
                <a href="signup.html" class="gold-text ml-1">Join the Circle</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your specific Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyC550tYO2IYMUtusP8DsizX93ptKHa1JQs",
          authDomain: "glamour-76f78.firebaseapp.com",
          projectId: "glamour-76f78",
          storageBucket: "glamour-76f78.firebasestorage.app",
          messagingSenderId: "378301162636",
          appId: "1:378301162636:web:abe1c6aba76a93447707a9",
          measurementId: "G-XBLLR2TCVG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('error-msg');
        const btn = document.getElementById('submitBtn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.innerText = "Authenticating...";
            btn.disabled = true;
            errorMsg.innerText = "";

            try {
                // Must sign in anonymously first to get permission to query Firestore
                await signInAnonymously(auth);

                const emailInput = document.getElementById('loginEmail').value.trim().toLowerCase();
                const passInput = document.getElementById('loginPassword').value;

                // Search the "users" collection for the document with this email
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("email", "==", emailInput));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    throw new Error("No account found with this email");
                }

                let loginSuccess = false;
                querySnapshot.forEach((doc) => {
                    const userData = doc.data();
                    if (userData.password === passInput) {
                        // Success! Save the username to local storage for the dashboard
                        localStorage.setItem('glamour_username', userData.username);
                        loginSuccess = true;
                    }
                });

                if (loginSuccess) {
                    errorMsg.style.color = "#d4af37";
                    errorMsg.innerText = "Welcome back! Redirecting...";
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    throw new Error("Incorrect password provided");
                }

            } catch (err) {
                errorMsg.style.color = "#ff4d4d";
                errorMsg.innerText = err.message;
                btn.innerText = "Unlock Dashboard";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
